version: "0.2"
language: en

ignorePaths:
  - .venv/**
  - node_modules/**
  - .git/**
  - htmlcov/**
  - .pytest_cache/**
  - "**/*.db"
  # Parser fixtures are real-world journal samples, not curated prose.
  - tests/fixtures/**

# Test search strings and keyword stems — valid in context, not vocabulary
# ("jurnals" is a deliberate typo'd-path fixture)
ignoreWords:
  - absentterm
  - dotdot
  - hardlinks
  - jurnals
  - nonexistentterm
  - nonstring
  - sanitiz
  - tlines

words:
  # Python / tooling
  - addopts
  - arcname
  - caplog
  - capsys
  - conftest
  - dataclass
  - debugpy
  - delenv
  - dedups
  - editorconfig
  - expanduser
  - fastmcp
  - groupindex
  - strptime
  - htmlcov
  - scikit
  - sklearn
  - isort
  - Makefiles
  - mccabe
  - minversion
  - mypy
  - precommit
  - procs
  - pycache
  - platformdirs
  - Pyflakes
  - pylint
  - pyproject
  - pyright
  - PYPI
  - pypa
  - sdist
  - pytest
  - pyyaml
  - relpath
  - stdlib
  - stopword
  - testpaths
  - tomli
  - tomllib
  - venv

  # Project conventions / acronyms
