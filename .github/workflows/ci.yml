name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node (for cspell + markdownlint)
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Create venv and install (dev + server extras)
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/python -m pip install -e ".[dev,server]"

      # `make check` = ruff + ruff-format + mypy + docs lint + tests.
      # The exact gate contributors run locally — no CI-only divergence.
      - name: Run the full gate (make check)
        run: make check
