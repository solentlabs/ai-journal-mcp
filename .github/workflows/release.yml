name: Release

# Cut a release by pushing a version tag (see docs/RELEASE.md):
#   git tag vX.Y.Z && git push --tags
# Build once, then publish to PyPI via trusted publishing (OIDC, no stored
# tokens). The publish job is the only thing granted id-token, and it only runs
# after a clean build — least privilege, fully deterministic from the tag.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Verify, test, build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify tag matches package version
        # a stale bump otherwise fails only at (or worse, after) PyPI upload
        run: |
          version=$(python -c "exec(open('src/ai_journal_mcp/__init__.py').read()); print(__version__)")
          if [ "v$version" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package version $version"
            exit 1
          fi
      - name: Run test suite
        # never publish a commit whose tests didn't run on exactly this ref
        run: |
          python -m pip install -e ".[server,dev]"
          python -m pytest -q
      - name: Build distributions
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Trusted publishing requires id-token; nothing else needs write access.
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
